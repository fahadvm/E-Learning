name: DevNext Backend CI/CD

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Build Docker Image
        run: docker build -t fahadvm/devnext-backend .

      - name: Push Image
        run: docker push fahadvm/devnext-backend

      - name: Deploy to Server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ubuntu
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            docker pull fahadvm/devnext-backend
            docker stop devnext || true
            docker rm devnext || true
            docker run -d \
              --name devnext \
              -p 5000:5000 \
              --env-file /home/ubuntu/.env \
              fahadvm/devnext-backend  